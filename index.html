<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>DEMOCODEX</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #000;
    font-family: Georgia, serif;
    color: #d4af37;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 40px 30px 30px;
    gap: 14px;
  }

  .title {
    margin: 0 0 30px 0;
    font-size: 64px;
    letter-spacing: 10px;
    font-weight: normal;
    color: #d4af37;
    text-shadow: 0 0 20px rgba(212,175,55,0.6), 0 0 40px rgba(212,175,55,0.3);
  }

  .row {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    gap: 130px;
  }

  .panel-left {
    display: grid;
    grid-template-columns: repeat(3, 42px);
    grid-template-rows: repeat(3, 42px);
    gap: 8px;
    flex: 0 0 auto;
  }
  .dot {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px dashed rgba(255,255,255,0.55);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .dot:hover {
    transform: scale(1.08);
  }
  .dot.selected {
    box-shadow: 0 0 10px rgba(255,255,255,0.9);
    border-color: #fff;
  }

  .stage {
    position: relative;
    width: 380px;
    max-width: 58vw;
    aspect-ratio: 410 / 670;
    flex: 0 0 auto;
  }
  .stage img.bg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .slot {
    position: absolute;
    width: 32px;
    height: 32px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    cursor: pointer;
    background: transparent;
    border: none;
  }
  .slot .fill {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: transparent;
    transition: background 0.15s;
  }

  .strip {
    width: 620px;
    max-width: 80vw;
    display: block;
  }

  .controls {
    display: flex;
    gap: 16px;
  }
  .btn {
    font-family: Georgia, serif;
    font-size: 15px;
    letter-spacing: 1px;
    background: transparent;
    color: #d4af37;
    border: 1px solid #d4af37;
    border-radius: 4px;
    padding: 8px 22px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn:hover {
    background: #d4af37;
    color: #000;
  }

  .poem-box {
    max-width: 500px;
    min-height: 24px;
    text-align: center;
    font-size: 16px;
    line-height: 1.6;
    font-style: italic;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: pre-line;
  }
  .poem-box.visible {
    opacity: 1;
  }
  .poem-box.error {
    font-style: normal;
    color: #a33;
  }
  .poem-image {
    max-width: 100%;
    max-height: 500px;
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 4px;
  }
</style>
</head>
<body>

<h1 class="title">DEMOCODEX</h1>

<div class="row">
  <div class="panel-left" id="panel-left"></div>

  <div class="stage">
    <img class="bg" src="assets/copertina.png" alt="copertina libro">

    <div class="slot" id="slot-luna" style="left:50.5%; top:32.5%;"><div class="fill"></div></div>
    <div class="slot" id="slot-mercurio" style="left:29.0%; top:42.0%;"><div class="fill"></div></div>
    <div class="slot" id="slot-venere" style="left:71.2%; top:40.9%;"><div class="fill"></div></div>
    <div class="slot" id="slot-marte" style="left:37.3%; top:58.6%;"><div class="fill"></div></div>
    <div class="slot" id="slot-sole" style="left:63.5%; top:58.2%;"><div class="fill"></div></div>
  </div>
</div>

<img class="strip" src="assets/striscia.png" alt="striscia legenda">

<div class="controls">
  <button class="btn" id="btn-decifra">DECIFRA</button>
  <button class="btn" id="btn-reset">RESET</button>
</div>

<div class="poem-box" id="poem-box"></div>

<script>
  var colors = [
    "#e63946", "#f1a208", "#2a9d8f",
    "#264653", "#8338ec", "#ff006e",
    "#06d6a0", "#ffd400", "#c1121f"
  ];

  var combinazioni = [
    { luna:5, mercurio:2, venere:6, marte:0, sole:1,
      poesia: `c'è una goccia di sangue o di rugiada
che sdrucciola, tra i solchi della storia
che rende viva la carne dell'uomo
c'è una goccia di sangue o di rugiada
che scorre, tra gli incavi della fronte
di gente in gente, per generazioni
sulla tacita pelle dei mortali
ai primi raggi del sole essa appare
e rifulge di morte e primavera` },
    { luna:8, mercurio:1, venere:5, marte:0, sole:8,
      poesia: `più bandiere di pace
sulla terra
basta soldati morti
per la guerra
più aquiloni in volo
più colombe
basta a chi soffoca
il cielo di bombe
più fratelli nel mondo
più alleati
inondiamo di fiori
i carri armati
più libri per bambini
e per bambine
basta fucili
bombe a mano e mine
che il vento scuota
le nostre bandiere
basta bunker
trincee e frontiere` },
    { luna:3, mercurio:0, venere:1, marte:6, sole:6,
      poesia: `oggi la luna è una perla di cenere
che si fa polvere tra le mie dita
oggi la luna è una perla di cenere
che sporca il grano e soffoca il raccolto
sferza nel cielo un tumulto di lame
grigie le lacrime, austere le nuvole
tacito ascolto il pianto del bracciante
che per anni ha mietuto il suo raccolto
oggi la luna è una perla di cenere
che si fa polvere tra le mie dita
oggi la luna è una perla di cenere
che fa eco alle rovine del passato` },
    { luna:1, mercurio:3, venere:1, marte:8, sole:6,
      poesia: `si dovrà dire di noi poeti
che spettiniamo il sole
che strucchiamo la luna
che siamo i pagliacci e i saltimbanchi
di una carovana che fa del viaggio
la sua destinazione` },
    { luna:0, mercurio:1, venere:3, marte:0, sole:6,
      poesia: `parlando al mio uomo sotto copertura
rinnego la mia ultima
interpretazione terrestre
l'identità è una terribile farsa

prova a contare
le costellazioni
della tua personalità
ciò che sei oggi
non eri ieri
ciò che eri ieri
non sarai domani
l'identità è futile resistenza
tentativo maldestramente riuscito
di tenere in piedi la struttura
della propria autostima` },
    { luna:0, mercurio:3, venere:0, marte:8, sole:2,
      poesia: `c'è una rosa imbruttita
chiusa in se stessa
una rosa ferita
ai piedi della strada
dischiude i petali al rombo dei ferri
torce lo stelo al respiro del traffico
teme per la sua vita e il suo colore
c'è una rosa imbruttita
chiusa in se stessa
una rosa ferita
ai piedi della strada
una gemma di sangue senza tempo
che lava con la pioggia ogni peccato
una regina sfiorita, tradita
che fa della rugiada le sue lacrime` },
    { luna:4, mercurio:6, venere:2, marte:8, sole:1,
      poesia: `c'è bisogno di un'ultima
poesia d'amore
prima che appassiscano
le radici del pianeta
prima che le nuvole
franino dal cielo
prima che sfioriscano
i borghi e le città
c'è bisogno di un'ultima
poesia d'amore
che risvegli il cuore
delle persone
che vesta i più fragili
i dimenticati e i vinti
con le scintillanti
armature del sole` },
    { luna:1, mercurio:4, venere:4, marte:4, sole:1,
      immagine: "assets/carta-segreta.jpg" }
  ];

  var panel = document.getElementById('panel-left');
  var selectedIndex = null;
  var dots = [];
  var slotState = { luna: null, mercurio: null, venere: null, marte: null, sole: null };

  colors.forEach(function(c, i) {
    var d = document.createElement('div');
    d.className = 'dot';
    d.style.background = c;
    d.dataset.index = i;
    d.addEventListener('click', function() {
      if (selectedIndex === i) {
        selectedIndex = null;
        d.classList.remove('selected');
      } else {
        dots.forEach(function(x) { x.classList.remove('selected'); });
        selectedIndex = i;
        d.classList.add('selected');
      }
    });
    panel.appendChild(d);
    dots.push(d);
  });

  document.querySelectorAll('.slot').forEach(function(s) {
    s.addEventListener('click', function() {
      if (selectedIndex === null) return;
      var key = s.id.replace('slot-', '');
      slotState[key] = selectedIndex;
      s.querySelector('.fill').style.background = colors[selectedIndex];
    });
  });

  var poemBox = document.getElementById('poem-box');

  document.getElementById('btn-decifra').addEventListener('click', function() {
    var match = combinazioni.find(function(c) {
      return c.luna === slotState.luna &&
             c.mercurio === slotState.mercurio &&
             c.venere === slotState.venere &&
             c.marte === slotState.marte &&
             c.sole === slotState.sole;
    });
    poemBox.classList.remove('error');
    poemBox.innerHTML = '';
    if (match) {
      if (match.immagine) {
        var img = document.createElement('img');
        img.src = match.immagine;
        img.className = 'poem-image';
        poemBox.appendChild(img);
      } else {
        poemBox.textContent = match.poesia;
      }
    } else {
      poemBox.classList.add('error');
      poemBox.textContent = "La combinazione non corrisponde a nessuna poesia.";
    }
    poemBox.classList.add('visible');
  });

  document.getElementById('btn-reset').addEventListener('click', function() {
    Object.keys(slotState).forEach(function(k) { slotState[k] = null; });
    document.querySelectorAll('.slot .fill').forEach(function(f) { f.style.background = 'transparent'; });
    dots.forEach(function(x) { x.classList.remove('selected'); });
    selectedIndex = null;
    poemBox.classList.remove('visible', 'error');
    poemBox.textContent = "";
    poemBox.innerHTML = "";
  });
</script>
</body>
</html>
