<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>DEMOCODEX</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #000 url('assets/sfondo.png') center center / cover no-repeat fixed;
    font-family: Georgia, serif;
    color: #d4af37;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 40px 30px 30px;
    gap: 14px;
  }
  .title {
    margin: 0 0 30px 0;
    font-size: 64px;
    letter-spacing: 10px;
    font-weight: normal;
    color: #d4af37;
    text-shadow: 0 0 20px rgba(212,175,55,0.6), 0 0 40px rgba(212,175,55,0.3);
  }
  .row {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    gap: 130px;
  }
  .panel-left {
    display: grid;
    grid-template-columns: repeat(3, 42px);
    grid-template-rows: repeat(3, 42px);
    gap: 8px;
    flex: 0 0 auto;
  }
  .dot {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px dashed rgba(255,255,255,0.55);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .dot:hover { transform: scale(1.08); }
  .dot.selected {
    box-shadow: 0 0 10px rgba(255,255,255,0.9);
    border-color: #fff;
  }
  .stage {
    position: relative;
    width: 380px;
    max-width: 58vw;
    aspect-ratio: 410 / 670;
    flex: 0 0 auto;
  }
  .stage img.bg { width: 100%; height: 100%; display: block; }
  .slot {
    position: absolute;
    width: 32px;
    height: 32px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    cursor: pointer;
    background: transparent;
    border: none;
  }
  .slot .fill {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: transparent;
    transition: background 0.15s;
  }
  .strip { width: 620px; max-width: 80vw; display: block; }
  .controls { display: flex; gap: 16px; }
  .btn {
    font-family: Georgia, serif;
    font-size: 15px;
    letter-spacing: 1px;
    background: transparent;
    color: #d4af37;
    border: 1px solid #d4af37;
    border-radius: 4px;
    padding: 8px 22px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn:hover { background: #d4af37; color: #000; }
  .poem-box {
    max-width: 500px;
    min-height: 24px;
    text-align: center;
    font-size: 16px;
    line-height: 1.6;
    font-style: italic;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: pre-line;
  }
  .poem-box.visible { opacity: 1; }
  .poem-box.error { font-style: normal; color: #a33; }
  .poem-image {
    max-width: 100%;
    max-height: 500px;
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 4px;
  }
</style>
</head>
<body>

<h1 class="title">DEMOCODEX</h1>

<div class="row">
  <div class="panel-left" id="panel-left"></div>
  <div class="stage">
    <img class="bg" src="assets/copertina.png" alt="copertina libro">
    <div class="slot" id="slot-luna"     style="left:50.5%; top:32.5%;"><div class="fill"></div></div>
    <div class="slot" id="slot-mercurio" style="left:29.0%; top:42.0%;"><div class="fill"></div></div>
    <div class="slot" id="slot-venere"   style="left:71.2%; top:40.9%;"><div class="fill"></div></div>
    <div class="slot" id="slot-marte"    style="left:37.3%; top:58.6%;"><div class="fill"></div></div>
    <div class="slot" id="slot-sole"     style="left:63.5%; top:58.2%;"><div class="fill"></div></div>
  </div>
</div>

<img class="strip" src="assets/striscia.png" alt="striscia legenda">

<div class="controls">
  <button class="btn" id="btn-decifra">DECIFRA</button>
  <button class="btn" id="btn-reset">RESET</button>
</div>

<div class="poem-box" id="poem-box"></div>

// --- Crypto helpers (Web Crypto API, nativa nel browser) ---

async function makeKey(luna, mercurio, venere, marte, sole) {
  var raw = "" + luna + mercurio + venere + marte + sole;
  var enc = new TextEncoder().encode(raw);
  var hash = await crypto.subtle.digest("SHA-256", enc);
  return crypto.subtle.importKey("raw", hash, { name:"AES-GCM" }, false, ["decrypt"]);
}

function b64ToBytes(b64) {
  var bin = atob(b64);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decrypt(entry, key) {
  var ct    = b64ToBytes(entry.ct);
  var nonce = b64ToBytes(entry.nonce);
  var tag   = b64ToBytes(entry.tag);
  // GCM: ciphertext + tag concatenati
  var ctTag = new Uint8Array(ct.length + tag.length);
  ctTag.set(ct); ctTag.set(tag, ct.length);
  var plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv: nonce }, key, ctTag);
  return new TextDecoder().decode(plain);
}

// --- UI ---

var panel = document.getElementById("panel-left");
var selectedIndex = null;
var dots = [];
var slotState = { luna: null, mercurio: null, venere: null, marte: null, sole: null };

colors.forEach(function(c, i) {
  var d = document.createElement("div");
  d.className = "dot";
  d.style.background = c;
  d.dataset.index = i;
  d.addEventListener("click", function() {
    if (selectedIndex === i) {
      selectedIndex = null;
      d.classList.remove("selected");
    } else {
      dots.forEach(function(x) { x.classList.remove("selected"); });
      selectedIndex = i;
      d.classList.add("selected");
    }
  });
  panel.appendChild(d);
  dots.push(d);
});

document.querySelectorAll(".slot").forEach(function(s) {
  s.addEventListener("click", function() {
    if (selectedIndex === null) return;
    var key = s.id.replace("slot-", "");
    slotState[key] = selectedIndex;
    s.querySelector(".fill").style.background = colors[selectedIndex];
  });
});

var poemBox = document.getElementById("poem-box");

document.getElementById("btn-decifra").addEventListener("click", async function() {
  poemBox.classList.remove("error", "visible");
  poemBox.innerHTML = "";

  var match = COMBINAZIONI.find(function(c) {
    return c.luna      === slotState.luna &&
           c.mercurio  === slotState.mercurio &&
           c.venere    === slotState.venere &&
           c.marte     === slotState.marte &&
           c.sole      === slotState.sole;
  });

  if (!match) {
    poemBox.classList.add("error");
    poemBox.textContent = "La combinazione non corrisponde a nessuna poesia.";
    poemBox.classList.add("visible");
    return;
  }

  if (match.tipo === "immagine") {
    var img = document.createElement("img");
    img.src = match.immagine;
    img.className = "poem-image";
    poemBox.appendChild(img);
    poemBox.classList.add("visible");
    return;
  }

  try {
    var cryptoKey = await makeKey(
      slotState.luna, slotState.mercurio,
      slotState.venere, slotState.marte, slotState.sole
    );
    var testo = await decrypt(match, cryptoKey);
    poemBox.textContent = testo;
    poemBox.classList.add("visible");
  } catch(e) {
    poemBox.classList.add("error");
    poemBox.textContent = "Errore di decifrazione.";
    poemBox.classList.add("visible");
  }
});

document.getElementById("btn-reset").addEventListener("click", function() {
  Object.keys(slotState).forEach(function(k) { slotState[k] = null; });
  document.querySelectorAll(".slot .fill").forEach(function(f) { f.style.background = "transparent"; });
  dots.forEach(function(x) { x.classList.remove("selected"); });
  selectedIndex = null;
  poemBox.classList.remove("visible", "error");
  poemBox.textContent = "";
  poemBox.innerHTML = "";
});
</script>
